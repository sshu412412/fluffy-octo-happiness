<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中期答辩展示网页</title>
  <style>
    :root{
      --green-dark:#1a5c3a;
      --green-mid:#2e8b57;
      --green-light:#6abf8a;
      --green-pale:#e8f5ee;
      --white:#ffffff;
      --gray-light:#f5f5f5;
      --gray-text:#444444;
      --accent:#e8a020;
      --border:rgba(26,92,58,.14);
      --shadow:0 24px 60px rgba(20,68,44,.12);
      --shadow-soft:0 10px 24px rgba(20,68,44,.08);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;
      --container:1440px;
      --ease:cubic-bezier(.2,.8,.2,1);
      color-scheme: light;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;
      color:var(--gray-text);
      background:
        radial-gradient(circle at top left, rgba(106,191,138,.18), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(26,92,58,.16), transparent 30%),
        linear-gradient(180deg, #f9fcfa 0%, #f2f8f4 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(26,92,58,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,92,58,.02) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(180deg, rgba(0,0,0,.14), transparent 72%);
      opacity:.55;
      z-index:0;
    }

    .app{
      position:relative;
      z-index:1;
      width:min(var(--container), calc(100vw - 32px));
      margin:20px auto 26px;
    }

    .shell{
      background:rgba(255,255,255,.86);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:34px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .nav-shell{
      position:sticky;
      top:0;
      z-index:30;
      background:linear-gradient(180deg, rgba(248,251,249,.98), rgba(248,251,249,.92));
      border-bottom:1px solid rgba(26,92,58,.08);
      backdrop-filter:blur(18px);
      box-shadow:0 10px 24px rgba(20,68,44,.06);
    }

    .topbar{
      display:grid;
      grid-template-columns:minmax(280px,1fr) auto;
      gap:18px;
      align-items:center;
      min-height:82px;
      padding:12px 18px 10px;
    }

    .topbar-brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .topbar-logo{
      width:248px;
      height:56px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      padding:0 4px;
      border-radius:16px;
      background:rgba(26,92,58,.03);
      border:1px solid rgba(26,92,58,.08);
      overflow:hidden;
    }

    .topbar-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:left center;
      display:block;
    }

    .topbar-copy{
      min-width:0;
      display:grid;
      gap:4px;
    }

    .topbar-kicker{
      font-size:12px;
      letter-spacing:.08em;
      color:#7d8d84;
      text-transform:uppercase;
    }

    .topbar-title{
      font-size:15px;
      font-weight:800;
      color:var(--green-dark);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topbar-stage{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(26,92,58,.12);
      color:var(--green-dark);
      font-size:13px;
      font-weight:700;
      box-shadow:0 6px 14px rgba(16,53,34,.05);
      white-space:nowrap;
    }

    .topbar-stage .pulse{
      width:8px;height:8px;border-radius:999px;background:#ffd35f;
      box-shadow:0 0 0 0 rgba(232,160,32,.55);
      animation:pulse 2.4s infinite var(--ease);
    }

    .tabs-row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      padding:12px 18px 16px;
      border-top:1px solid rgba(26,92,58,.06);
    }

    .hero{
      display:grid;
      grid-template-columns:1fr auto;
      gap:24px;
      align-items:center;
      padding:22px 28px 22px;
      background:
        linear-gradient(135deg, rgba(26,92,58,.98), rgba(46,139,87,.94)),
        radial-gradient(circle at top right, rgba(255,255,255,.1), transparent 40%);
      color:#fff;
    }

    .brand{
      display:flex;
      align-items:flex-start;
      gap:0;
      min-width:0;
    }

    .brand-copy{min-width:0}
    .brand-copy .meta{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px 10px;
      margin-bottom:10px;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,.88);
    }

    .brand-copy .meta .dot{
      width:4px;height:4px;border-radius:999px;background:rgba(255,255,255,.76);
    }

    .paper-title{
      margin:0;
      font-size:clamp(22px, 2.2vw, 34px);
      line-height:1.18;
      letter-spacing:.02em;
      color:#fff;
      text-wrap:balance;
    }

    .paper-subtitle{
      margin:10px 0 0;
      font-size:14px;
      line-height:1.65;
      color:rgba(255,255,255,.88);
      max-width:72ch;
    }

    .hero-info{
      display:grid;
      gap:10px;
      min-width:260px;
      justify-items:end;
      text-align:right;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:12px;
      letter-spacing:.06em;
      backdrop-filter:blur(8px);
    }

    .hero-badge .pulse{
      width:8px;height:8px;border-radius:999px;background:#ffd35f;
      box-shadow:0 0 0 0 rgba(232,160,32,.55);
      animation:pulse 2.4s infinite var(--ease);
    }

    .hero-stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .stat{
      min-width:118px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(8px);
    }

    .stat .label{
      display:block;
      font-size:12px;
      color:rgba(255,255,255,.74);
      margin-bottom:6px;
    }

    .stat .value{
      display:block;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:14px;
      color:#fff;
    }

    .nav-shell{
      position:sticky;
      top:0;
      z-index:30;
      background:linear-gradient(180deg, rgba(248,251,249,.98), rgba(248,251,249,.92));
      border-bottom:1px solid rgba(26,92,58,.08);
      backdrop-filter:blur(18px);
      box-shadow:0 10px 24px rgba(20,68,44,.06);
    }

    .tab-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .tab-btn{
      appearance:none;
      border:1px solid rgba(26,92,58,.14);
      background:#fff;
      color:var(--green-dark);
      border-radius:999px;
      padding:0 18px;
      height:44px;
      font:600 14px/1 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      cursor:pointer;
      transition:transform .2s var(--ease), background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease), box-shadow .2s var(--ease);
      box-shadow:0 2px 8px rgba(16,53,34,.04);
    }

    .tab-btn:hover{transform:translateY(-1px);border-color:rgba(46,139,87,.28)}
    .tab-btn[aria-selected="true"]{
      background:linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color:#fff;
      border-color:transparent;
      box-shadow:0 14px 28px rgba(26,92,58,.24);
    }

    .nav-tools{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-left:auto;
    }

    .toggle,
    .action-btn,
    .select{
      border:1px solid rgba(26,92,58,.14);
      background:#fff;
      border-radius:14px;
      color:var(--green-dark);
      height:42px;
      padding:0 14px;
      font:600 13px/1 system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      box-shadow:0 6px 14px rgba(16,53,34,.05);
    }

    .toggle{
      display:inline-flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .switch{
      width:42px;
      height:24px;
      background:#d5e6dc;
      border-radius:999px;
      position:relative;
      flex:0 0 auto;
      transition:background .22s var(--ease);
    }

    .switch::after{
      content:"";
      position:absolute;
      top:3px;
      left:3px;
      width:18px;
      height:18px;
      border-radius:999px;
      background:#fff;
      box-shadow:0 4px 12px rgba(0,0,0,.16);
      transition:transform .22s var(--ease);
    }

    .toggle[data-on="true"] .switch{background:linear-gradient(135deg, var(--green-mid), var(--green-dark))}
    .toggle[data-on="true"] .switch::after{transform:translateX(18px)}

    .status-dot{
      width:8px;height:8px;border-radius:999px;background:var(--accent);
      box-shadow:0 0 0 6px rgba(232,160,32,.12);
      margin-right:2px;
    }

    .select{
      min-width:140px;
      appearance:none;
      background-image:linear-gradient(45deg, transparent 50%, var(--green-dark) 50%), linear-gradient(135deg, var(--green-dark) 50%, transparent 50%);
      background-position:calc(100% - 18px) 18px, calc(100% - 12px) 18px;
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:34px;
    }

    .content{
      padding:24px 18px 12px;
    }

    .panel{
      display:none;
      animation:fadeUp .36s var(--ease) both;
    }

    .panel.active{display:block}

    .panel-frame{
      max-width:1240px;
      margin:0 auto;
      display:grid;
      gap:22px;
    }

    .section-grid{
      display:grid;
      gap:22px;
    }

    .two-col{
      grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);
    }

    .three-col{
      grid-template-columns:repeat(2, minmax(0, 1fr));
    }

    .card{
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .card-pad{padding:26px}
    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .card-title{
      margin:0;
      font-size:20px;
      line-height:1.28;
      color:var(--green-dark);
    }

    .card-desc{
      margin:8px 0 0;
      font-size:14px;
      line-height:1.85;
      color:#5a6861;
      max-width:64ch;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--green-pale);
      color:var(--green-dark);
      border:1px solid rgba(26,92,58,.08);
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .pill.orange{background:rgba(232,160,32,.12);color:#99650a}
    .pill.green{background:rgba(46,139,87,.12);color:var(--green-dark)}

    .display-title{
      font-size:clamp(28px, 3.2vw, 46px);
      line-height:1.08;
      color:var(--green-dark);
      margin:0 0 14px;
      text-wrap:balance;
    }

    .lead{
      font-size:15px;
      line-height:1.95;
      color:#4f5f57;
      margin:0;
    }

    .callout{
      margin-top:18px;
      padding:16px 18px;
      border-radius:20px;
      background:linear-gradient(135deg, rgba(232,245,238,.98), rgba(255,255,255,.94));
      border:1px solid rgba(106,191,138,.24);
    }

    .callout strong{color:var(--green-dark)}

    .subquestion-grid{
      display:grid;
      gap:14px;
      margin-top:22px;
    }

    .subquestion{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:14px;
      padding:18px 18px;
      border-radius:20px;
      background:#fff;
      border:1px solid rgba(26,92,58,.08);
      align-items:start;
    }

    .subquestion .num{
      width:36px;
      height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg, var(--green-mid), var(--green-dark));
      box-shadow:0 10px 18px rgba(26,92,58,.16);
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }

    .subquestion h4{
      margin:0 0 6px;
      color:var(--green-dark);
      font-size:16px;
    }

    .subquestion p{
      margin:0;
      font-size:13px;
      line-height:1.7;
      color:#55645c;
    }

    .list{
      display:grid;
      gap:12px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .list li{
      display:flex;
      gap:10px;
      align-items:flex-start;
      line-height:1.65;
      font-size:14px;
      color:#516059;
    }

    .bullet{
      width:8px;height:8px;border-radius:999px;background:var(--green-mid);margin-top:8px;flex:0 0 auto;
      box-shadow:0 0 0 4px rgba(46,139,87,.08);
    }

    .framework{
      position:relative;
      overflow:hidden;
      min-height:100%;
    }

    .framework::after{
      content:"";
      position:absolute;
      inset:auto -20% -18% auto;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(106,191,138,.18), rgba(106,191,138,0) 68%);
      pointer-events:none;
    }

    .framework-grid{
      display:grid;
      gap:14px;
    }

    .framework-item{
      padding:16px 18px;
      border-radius:18px;
      background:rgba(232,245,238,.78);
      border:1px solid rgba(26,92,58,.08);
    }

    .framework-item .k{
      display:block;
      font-size:12px;
      letter-spacing:.06em;
      color:#648173;
      margin-bottom:6px;
    }

    .framework-item .v{
      display:block;
      color:var(--green-dark);
      line-height:1.7;
      font-size:14px;
    }

    .progress-list{
      display:grid;
      gap:14px;
    }

    .progress-row{
      display:grid;
      grid-template-columns:minmax(220px,.95fr) 1.35fr auto;
      gap:16px;
      align-items:center;
      padding:16px 18px;
      border-radius:20px;
      background:#fff;
      border:1px solid rgba(26,92,58,.08);
    }

    .progress-row strong{
      color:var(--green-dark);
      font-size:14px;
      line-height:1.45;
    }

    .bar{
      position:relative;
      height:12px;
      border-radius:999px;
      background:#edf3ef;
      overflow:hidden;
    }

    .bar > span{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg, var(--green-mid), #64ba86);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
      transition:width 1.1s var(--ease);
    }

    .progress-row .pct{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:var(--green-dark);
      font-weight:800;
    }

    details.chapter{
      border:1px solid rgba(26,92,58,.08);
      border-radius:20px;
      background:#fff;
      overflow:hidden;
    }

    details.chapter + details.chapter{margin-top:14px}

    details.chapter summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:20px 22px;
      color:var(--green-dark);
      font-weight:800;
      font-size:16px;
    }

    details.chapter summary::-webkit-details-marker{display:none}

    .chapter-main{
      display:flex;
      gap:10px;
      align-items:flex-start;
    }

    .chapter-tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(26,92,58,.08);
      color:var(--green-dark);
      font-size:12px;
      font-weight:700;
      flex:0 0 auto;
    }

    .chapter-body{
      padding:0 22px 22px;
      border-top:1px solid rgba(26,92,58,.08);
    }

    .chapter-body .cols{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:18px;
    }

    .mini-block{
      padding:16px 18px;
      background:var(--green-pale);
      border:1px solid rgba(106,191,138,.16);
      border-radius:18px;
    }

    .mini-block h5{
      margin:0 0 8px;
      color:var(--green-dark);
      font-size:13px;
      letter-spacing:.02em;
    }

    .mini-block p,
    .mini-block li{
      font-size:13px;
      line-height:1.7;
      color:#55645c;
    }

    .timeline{
      position:relative;
      display:grid;
      gap:14px;
      padding-left:18px;
    }

    .timeline::before{
      content:"";
      position:absolute;
      left:6px;
      top:6px;
      bottom:6px;
      width:2px;
      background:linear-gradient(180deg, rgba(26,92,58,.18), rgba(46,139,87,.45));
    }

    .timeline-item{
      position:relative;
      padding:18px 20px 18px 24px;
      background:#fff;
      border:1px solid rgba(26,92,58,.08);
      border-radius:20px;
    }

    .timeline-item::before{
      content:"";
      position:absolute;
      left:-18px;
      top:22px;
      width:12px;
      height:12px;
      border-radius:999px;
      background:var(--green-mid);
      box-shadow:0 0 0 5px rgba(46,139,87,.12);
    }

    .timeline-item.current{
      background:linear-gradient(135deg, rgba(232,245,238,.98), rgba(255,255,255,.98));
      border-color:rgba(106,191,138,.28);
      box-shadow:0 16px 28px rgba(20,68,44,.08);
    }

    .timeline-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:10px;
    }

    .timeline-top strong{
      color:var(--green-dark);
      font-size:15px;
    }

    .timeline-top span{
      color:#7a8a81;
      font-size:12px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:nowrap;
    }

    table.plan-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border-radius:18px;
      border:1px solid rgba(26,92,58,.08);
      background:#fff;
    }

    .plan-table th,
    .plan-table td{
      padding:16px 18px;
      text-align:left;
      vertical-align:top;
      border-bottom:1px solid rgba(26,92,58,.07);
      font-size:14px;
      line-height:1.85;
    }

    .plan-table th{
      background:var(--green-pale);
      color:var(--green-dark);
      font-size:13px;
      letter-spacing:.02em;
    }

    .plan-table tr:last-child td{border-bottom:none}

    .highlight-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
    }

    .highlight-card{
      position:relative;
      padding:26px 24px 24px;
      border-radius:26px;
      overflow:hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(232,245,238,.88));
      border:1px solid rgba(26,92,58,.08);
      box-shadow:var(--shadow-soft);
    }

    .highlight-card::after{
      content:attr(data-index);
      position:absolute;
      right:16px;
      top:8px;
      font-size:66px;
      line-height:1;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-weight:900;
      color:rgba(26,92,58,.08);
    }

    .highlight-card h3{
      margin:0 0 14px;
      color:var(--green-dark);
      font-size:20px;
      line-height:1.28;
      padding-right:54px;
    }

    .highlight-card ul{
      margin:0;
      padding-left:20px;
      color:#55645c;
      line-height:1.9;
      font-size:14px;
    }

    .closing{
      text-align:center;
      padding:48px 22px 38px;
      background:
        radial-gradient(circle at center, rgba(106,191,138,.16), transparent 48%),
        linear-gradient(135deg, rgba(255,255,255,.98), rgba(232,245,238,.92));
      border:1px solid rgba(26,92,58,.08);
      border-radius:32px;
      box-shadow:var(--shadow-soft);
    }

    .closing h2{
      margin:0;
      font-size:clamp(30px, 4vw, 56px);
      line-height:1.12;
      color:var(--green-dark);
      text-wrap:balance;
    }

    .closing p{

              `).join("")}
            </div>
          </article>

          <aside class="card card-pad framework">
            <div class="card-head">
              <div>
                <div class="pill">研究框架</div>
                <h3 class="card-title">理论、方法与案例边界</h3>
                <p class="card-desc">左侧看问题，右侧看方法和材料，适合答辩时快速定位研究逻辑。</p>
              </div>
            </div>
            <div class="framework-grid">
              ${t.framework.map(item => `
                <div class="framework-item">
                  <span class="k">${escapeHtml(item.k)}</span>
                  <span class="v">${escapeHtml(item.v)}</span>
                </div>
              `).join("")}
            </div>
          </aside>
        </div>
      `;
    }

    function completedTemplate() {
      const t = data.tabs.completed;
      return `
        <div class="panel-frame section-grid" style="gap:22px">
          <article class="card card-pad">
            <div class="card-head">
              <div>
                <div class="pill green">完成情况总览</div>
                <h2 class="card-title">章节进度一眼可见</h2>
                <p class="card-desc">已完成的章节用高亮完成度展示，未完成部分保持低调，便于答辩现场明确当前工作状态。</p>
              </div>
            </div>
            <div class="progress-list">
              ${t.progress.map(item => `
                <div class="progress-row">
                  <strong>${escapeHtml(item.title)}</strong>
                  <div class="bar" aria-label="${escapeHtml(item.title)} 进度">
                    <span data-progress="${item.value}"></span>
                  </div>
                  <div class="pct">${item.value}% · ${escapeHtml(item.state)}</div>
                </div>
              `).join("")}
            </div>
          </article>

          <div>
            ${t.chapters.map((chapter, idx) => `
              <details class="chapter" ${idx === 0 ? "open" : ""}>
                <summary>
                  <span class="chapter-main">
                    <span class="chapter-tag">${escapeHtml(chapter.tag)}</span>
                    <span>${escapeHtml(chapter.title)}</span>
                  </span>
                  <span class="pill">${escapeHtml(chapter.summary)}</span>
                </summary>
                <div class="chapter-body">
                  <div class="cols">
                    ${chapter.blocks.map(block => `
                      <div class="mini-block">
                        <h5>${escapeHtml(block.title)}</h5>
                        <ul style="margin:0;padding-left:18px">
                          ${block.items.map(i => `<li>${escapeHtml(i)}</li>`).join("")}
                        </ul>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </details>
            `).join("")}
          </div>
        </div>
      `;
    }

    function todoTemplate() {
      const t = data.tabs.todo;
      return `
        <div class="panel-frame section-grid two-col">
          ${t.chapters.map(chapter => `
            <article class="card card-pad">
              <div class="card-head">
                <div>
                  <div class="pill orange">待完成章节</div>
                  <h2 class="card-title">${escapeHtml(chapter.title)}</h2>
                </div>
              </div>
              <div class="mini-block" style="margin-top:8px">
                <h5>核心论点</h5>
                <p style="margin:0">${escapeHtml(chapter.core)}</p>
              </div>
              <div class="mini-block" style="margin-top:14px">
                <h5>章节结构</h5>
                <ul style="margin:0;padding-left:18px">
                  ${chapter.sections.map(s => `<li>${escapeHtml(s)}</li>`).join("")}
                </ul>
              </div>
              <div class="mini-block" style="margin-top:12px">
                <h5>所需资料</h5>
                <p style="margin:0">${escapeHtml(chapter.materials)}</p>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function planTemplate() {
      const t = data.tabs.plan;
      return `
        <div class="panel-frame section-grid two-col">
          <article class="card card-pad">
            <div class="card-head">
              <div>
                <div class="pill green">时间轴</div>
                <h2 class="card-title">研究推进节点</h2>
                <p class="card-desc">把项目节奏做成纵向时间线，答辩现场更容易说明“已做什么、接下来做什么”。</p>
              </div>
            </div>
            <div class="timeline">
              ${t.timeline.map(item => `
                <div class="timeline-item ${item.current ? "current" : ""}">
                  <div class="timeline-top">
                    <strong>${escapeHtml(item.title)}</strong>
                    <span>${escapeHtml(item.time)}</span>
                  </div>
                  <div class="card-desc" style="margin:0">${escapeHtml(item.detail)}</div>
                </div>
              `).join("")}
            </div>
          </article>

          <article class="card card-pad">
            <div class="card-head">
              <div>
                <div class="pill">待完成访谈计划</div>
                <h2 class="card-title">补充材料安排</h2>
                <p class="card-desc">将访谈对象、访谈人次和重点议题并列展示，方便老师快速判断后续工作量。</p>
              </div>
            </div>
            <table class="plan-table">
              <thead>
                <tr>
                  <th>计划访谈主体</th>
                  <th>人次</th>
                  <th>重点议题</th>
                </tr>
              </thead>
              <tbody>
                ${t.interviews.map(row => `
                  <tr>
                    <td>${escapeHtml(row.subject)}</td>
                    <td><strong>${escapeHtml(row.count)}</strong></td>
                    <td>${escapeHtml(row.topic)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </article>
        </div>
      `;
    }

    function highlightsTemplate() {
      const t = data.tabs.highlights;
      return `
        <div class="panel-frame highlight-grid">
          ${t.cards.map((card, idx) => `
            <article class="highlight-card" data-index="0${idx + 1}">
              <h3>${escapeHtml(card.title)}</h3>
              <ul>
                ${card.items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
              </ul>
            </article>
          `).join("")}
        </div>
      `;
    }

    function endingTemplate() {
      const t = data.tabs.ending;
      return `
        <div class="panel-frame">
          <div class="closing">
          <h2>${escapeHtml(t.title)}</h2>
          <p>${escapeHtml(t.body)}</p>
          <div class="thanks">${escapeHtml(t.note)}</div>
          </div>
        </div>
      `;
    }

    function renderTab(tabName) {
      state.currentTab = tabName;
      tabs.forEach(btn => btn.setAttribute("aria-selected", String(btn.dataset.tab === tabName)));
      mobileTab.value = tabName;
      Object.values(data.tabs);
      const panel = panelMap.get(tabName);
      let html = "";
      if (tabName === "overview") html = overviewTemplate();
      if (tabName === "completed") html = completedTemplate();
      if (tabName === "todo") html = todoTemplate();
      if (tabName === "plan") html = planTemplate();
      if (tabName === "highlights") html = highlightsTemplate();
      if (tabName === "ending") html = endingTemplate();
      panel.innerHTML = html;
      panelMap.forEach((p, key) => p.classList.toggle("active", key === tabName));
      setupEditable(panel);
      animateProgress(panel);
    }

    function setupEditable(root) {
      root.querySelectorAll("[data-editable-target]").forEach(el => {
        const path = el.dataset.editableTarget;
        const value = getValueByPath(path);
        if (el.tagName === "H2" || el.tagName === "H3" || el.tagName === "H4" || el.tagName === "P" || el.tagName === "SPAN" || el.tagName === "DIV") {
          if (el.textContent !== value) el.textContent = value;
        }
        el.dataset.editable = state.editMode ? "true" : "false";
        el.contentEditable = state.editMode ? "true" : "false";
        if (state.editMode && !el.dataset.bound) {
          el.dataset.bound = "1";
          el.addEventListener("input", () => {
            setValueByPath(path, el.innerText.replace(/\u00a0/g, " ").trimEnd());
            renderHeader();
          });
        }
      });
    }

    function animateProgress(root) {
      requestAnimationFrame(() => {
        root.querySelectorAll("[data-progress]").forEach(el => {
          el.style.width = `${el.dataset.progress}%`;
        });
      });
    }

    function copyAll() {
      const lines = [];
      lines.push("中期答辩展示网页");
      lines.push(data.meta.title);
      lines.push(data.meta.subtitle);
      lines.push(`作者：${data.meta.author}`);
      lines.push(`导师：${data.meta.advisor}`);
      lines.push(`项目：${data.meta.case}`);
      lines.push("");
      lines.push("概览");
      lines.push(data.tabs.overview.lead);
      lines.push(`核心研究问题：${data.tabs.overview.question}`);
      data.tabs.overview.subquestions.forEach((q, i) => {
        lines.push(`${i + 1}. ${q.title} - ${q.desc}`);
      });
      lines.push("");
      lines.push("研究框架");
      data.tabs.overview.framework.forEach(item => lines.push(`${item.k}：${item.v}`));
      lines.push("");
      lines.push("已完成");
      data.tabs.completed.progress.forEach(item => lines.push(`${item.title}：${item.value}% · ${item.state}`));
      data.tabs.completed.chapters.forEach(chapter => {
        lines.push(chapter.title);
        chapter.blocks.forEach(block => {
          lines.push(`- ${block.title}`);
          block.items.forEach(i => lines.push(`  · ${i}`));
        });
      });
      lines.push("");
      lines.push("待完成");
      data.tabs.todo.chapters.forEach(chapter => {
        lines.push(chapter.title);
        lines.push(`核心论点：${chapter.core}`);
        chapter.sections.forEach(s => lines.push(`- ${s}`));
        lines.push(`所需资料：${chapter.materials}`);
      });
      lines.push("");
      lines.push("研究进度与计划");
      data.tabs.plan.timeline.forEach(item => lines.push(`${item.time}｜${item.title}｜${item.detail}`));
      lines.push("");
      lines.push("待完成访谈计划");
      data.tabs.plan.interviews.forEach(item => lines.push(`${item.subject}｜${item.count}｜${item.topic}`));
      lines.push("");
      lines.push("亮点与创新点");
      data.tabs.highlights.cards.forEach(card => {
        lines.push(card.title);
        card.items.forEach(i => lines.push(`- ${i}`));
      });
      lines.push("");
      lines.push("结语");
      lines.push(data.tabs.ending.title);
      lines.push(data.tabs.ending.body);
      lines.push(data.tabs.ending.note);
      return lines.join("\n");
    }

    function syncMeta() {
      renderHeader();
      renderTab(state.currentTab);
    }

    tabs.forEach(btn => {
      btn.addEventListener("click", () => renderTab(btn.dataset.tab));
    });

    mobileTab.innerHTML = tabs.map(btn => `<option value="${btn.dataset.tab}">${btn.textContent}</option>`).join("");
    mobileTab.addEventListener("change", () => renderTab(mobileTab.value));

    editToggle.addEventListener("click", () => {
      state.editMode = !state.editMode;
      editToggle.dataset.on = String(state.editMode);
      editLabel.textContent = state.editMode ? "编辑模式开启" : "编辑模式关闭";
      syncMeta();
    });

    copyBtn.addEventListener("click", async () => {
      const text = copyAll();
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "已复制";
        setTimeout(() => copyBtn.textContent = "复制全部内容", 1200);
      } catch {
        clipboardSink.value = text;
        clipboardSink.focus();
        clipboardSink.select();
        document.execCommand("copy");
        copyBtn.textContent = "已复制";
        setTimeout(() => copyBtn.textContent = "复制全部内容", 1200);
      }
    });

    renderHeader();
    renderTab(state.currentTab);
    mobileTab.value = state.currentTab;
  </script>
</body>
</html>
